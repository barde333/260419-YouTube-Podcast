<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Podcast</title>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #f5f5f5;
      font-family: 'Caveat', cursive;
      color: #222;
      padding: 20px;
    }
    .container {
      max-width: 520px;
      background: #fff;
      border-radius: 8px;
      overflow: hidden;
      margin: 0 auto;
      border: 1px solid #e8e8e8;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    /* Header */
    .header {
      padding: 18px 24px 14px;
      border-bottom: 1px solid #eee;
    }
    .header-title {
      font-size: 20px;
      font-weight: 700;
      color: #111;
      letter-spacing: -0.5px;
    }
    .header-subtitle {
      font-size: 11px;
      color: #aaa;
      font-family: 'Space Mono', monospace;
      margin-top: 2px;
    }
    /* Input row */
    .input-row {
      padding: 14px 24px;
      border-bottom: 1px solid #eee;
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .url-input {
      flex: 1;
      height: 36px;
      background: #fafafa;
      border: 1.5px solid #e0e0e0;
      border-radius: 4px;
      padding: 0 10px;
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      color: #333;
      outline: none;
    }
    .url-input::placeholder {
      color: #bbb;
    }
    .btn {
      height: 36px;
      padding: 0 16px;
      background: #3a88cc;
      border: 2px solid #3a88cc;
      border-radius: 4px;
      color: #fff;
      font-family: 'Caveat', cursive;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
    }
    .btn:hover {
      background: #2e72b0;
      border-color: #2e72b0;
    }
    .btn-small {
      padding: 4px 10px;
      height: auto;
      font-size: 12px;
      background: #fee2e2;
      border: 1px solid #fca5a5;
      color: #dc2626;
    }
    .btn-small:hover {
      background: #fecaca;
      border-color: #f87171;
    }
    /* Status */
    .status {
      padding: 8px 24px;
      background: #f0faf0;
      border-bottom: 1px solid #d4ead4;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: #2a8a2a;
    }
    .status.error {
      background: #fef2f2;
      border-bottom-color: #fecaca;
      color: #dc2626;
    }
    /* Table */
    .table-header {
      display: grid;
      grid-template-columns: 1fr 70px 70px 80px;
      padding: 8px 24px;
      border-bottom: 1px solid #eee;
      background: #fafafa;
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      color: #aaa;
      text-transform: uppercase;
    }
    .table-row {
      display: grid;
      grid-template-columns: 1fr 70px 70px 80px;
      padding: 10px 24px;
      border-bottom: 1px solid #f0f0f0;
      align-items: center;
    }
    .table-row:last-child {
      border-bottom: none;
    }
    .table-title {
      font-family: 'Caveat', cursive;
      font-size: 13px;
      color: #222;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .table-cell {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      color: #999;
    }
    .empty-message {
      padding: 20px 24px;
      text-align: center;
      color: #aaa;
      font-size: 13px;
    }
    /* RSS footer */
    .rss-footer {
      margin: 14px 24px;
      background: #f7f7f7;
      border: 1px solid #e8e8e8;
      border-radius: 6px;
      padding: 12px 14px;
    }
    .rss-label {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      color: #aaa;
      margin-bottom: 6px;
      text-transform: uppercase;
    }
    .rss-url-row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
    }
    .rss-url {
      flex: 1;
      height: 28px;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      padding: 0 8px;
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      color: #888;
      display: flex;
      align-items: center;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .btn-copy {
      padding: 4px 10px;
      height: 28px;
      font-size: 12px;
      font-family: 'Caveat', cursive;
      background: #3a88cc;
      border: 2px solid #3a88cc;
      color: #fff;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-copy:hover {
      background: #2e72b0;
      border-color: #2e72b0;
    }
    .rss-link {
      font-family: 'Caveat', cursive;
      font-size: 12px;
      color: #3a88cc;
      text-decoration: none;
      cursor: pointer;
    }
    .rss-link:hover {
      text-decoration: underline;
    }
    .feedback {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #fff;
      border: 1px solid #e0e0e0;
      color: #2a8a2a;
      padding: 8px 12px;
      border-radius: 4px;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .feedback.show {
      opacity: 1;
      pointer-events: auto;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="header-title">🎙 YouTube Podcast</div>
      <div class="header-subtitle">Convertisseur YouTube → RSS</div>
    </div>

    <!-- Input row -->
    <div class="input-row">
      <input type="text" class="url-input" id="urlInput" placeholder="https://youtube.com/watch?v=..." />
      <button class="btn" id="addBtn">Ajouter</button>
    </div>

    <!-- Status -->
    <div class="status" id="status" style="display: none;"></div>

    <!-- Table -->
    <div id="tableContainer">
      {% if episodes %}
        <div class="table-header">
          <div>Titre</div>
          <div>Durée</div>
          <div>Date</div>
          <div>Actions</div>
        </div>
        {% for ep in episodes %}
          <div class="table-row">
            <div class="table-title">{{ ep.title }}</div>
            <div class="table-cell">{{ ep.duration }}</div>
            <div class="table-cell">{{ ep.date }}</div>
            <button class="btn btn-small" onclick="deleteEpisode({{ ep.id }})">Supprimer</button>
          </div>
        {% endfor %}
      {% else %}
        <div class="empty-message">Colle une URL YouTube pour commencer</div>
      {% endif %}
    </div>

    <!-- RSS footer -->
    <div class="rss-footer">
      <div class="rss-label">Flux RSS</div>
      <div class="rss-url-row">
        <div class="rss-url" id="rssUrl">{{ rss_url }}</div>
        <button class="btn-copy" id="copyBtn">Copier</button>
      </div>
      <div>
        🎧 <a href="pocketcasts://subscribe?url={{ rss_url }}" class="rss-link">Ouvrir dans Pocket Casts</a>
      </div>
    </div>
  </div>

  <div class="feedback" id="feedback"></div>

  <script>
    const urlInput = document.getElementById('urlInput');
    const addBtn = document.getElementById('addBtn');
    const copyBtn = document.getElementById('copyBtn');
    const status = document.getElementById('status');
    const feedback = document.getElementById('feedback');

    addBtn.addEventListener('click', async () => {
      const url = urlInput.value.trim();
      if (!url) { showStatus('Colle une URL YouTube', true); return; }
      showStatus('Envoi…');
      try {
        const r = await fetch('/api/episodes', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url })
        });
        const data = await r.json();
        if (!r.ok) {
          showStatus(data.error || 'Erreur', true);
          return;
        }
        showStatus(data.duplicate ? '✓ Déjà présent' : '✓ Conversion en cours — recharge la page dans 1–2 min');
        urlInput.value = '';
      } catch (e) {
        showStatus('Erreur réseau', true);
      }
    });

    copyBtn.addEventListener('click', () => {
      const rssUrl = document.getElementById('rssUrl');
      navigator.clipboard.writeText(rssUrl.textContent).then(() => {
        showFeedback('✓ URL copiée');
      });
    });

    function showStatus(msg, isError = false) {
      status.textContent = isError ? '✗ ' + msg : msg;
      status.className = isError ? 'status error' : 'status';
      status.style.display = 'block';
    }

    function showFeedback(msg) {
      feedback.textContent = msg;
      feedback.classList.add('show');
      setTimeout(() => feedback.classList.remove('show'), 2000);
    }

    async function deleteEpisode(id) {
      if (!confirm('Supprimer cet épisode ?')) return;
      const r = await fetch('/api/episodes/' + id, {
        method: 'DELETE'
      });
      if (r.ok) {
        showFeedback('✓ Épisode supprimé');
        setTimeout(() => location.reload(), 800);
      } else {
        showFeedback('✗ Erreur');
      }
    }
  </script>
</body>
</html>
